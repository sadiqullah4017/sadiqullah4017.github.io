    <script>

        function calculateQuadrilateral() {
    let inputs = ["H", "W"];
    let values = {};

    for (let input of inputs) {
        values[input] = document.getElementById(input).value.trim();
        if (values[input] === "") {
            alert("Please fill in all fields.");
            return;
        }
    }

    let H = parseFloat(values.H);
    let W = parseFloat(values.W);

    let output = document.getElementById("output");
    output.innerHTML = ""; // Clear previous output
    output.style.display = "block";

    
        let area = ellipticSegment(H,W);
        output.innerHTML += "ক্ষেত্রফল = " + area.toFixed(2) + " বর্গ ফুট <br/><br/>";
        output.innerHTML += "ক্ষেত্রফল = " + (area / 435.6).toFixed(3) + " শতাংশ<br/><br/>";
    
}


function ellipticSegment(H,W) {
  // Elliptic segment
    return (Math.PI)*H*W;
}
