
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/login.css">
  <title>QuadDividerPro - Login</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/UAParser.js/0.7.31/ua-parser.min.js"></script>
</head>
<body>
  <h1>QuadDividerPro - Login</h1>
  <div id="loginForm">
    <button id="loginButton">
      <img src="/image/google_icon.svg" alt="Google Logo">
      oogle LogIn
    </button>
  </div>
  <div id="userInfo">
    <input id="name" type="text" placeholder="Your Name">
    <input id="phone" type="tel" placeholder="Phone Number">
    <button id="submitName">Continue</button>
  </div>
  <div id="loginMessage"></div>
  <script src="/js/login.js" type="module"></script>
</body>
</html>
