<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/login.css">
  <title>QuadDividerPro - Sign Up</title>
</head>
<body>
  <h1>QuadDividerPro - Sign Up</h1>
  
  <!-- SignUp Form -->
  <div id="signUpForm">
    <input id="email" type="email" placeholder="Your E-mail">
    <input id="password" type="password" placeholder="Create a password">
    <button id="signUpButton">Create Account</button>
    <p>আগে থেকেই একাউন্ট আছে? <a href="/login.html">Log In</a></p>
  </div>

  <!-- User Info Form (Initially hidden) -->
  <div id="userInfo" style="display: none;">
    <input id="name" type="text" placeholder="Your Full Name">
    <input id="phone" type="tel" placeholder="Phone Number">
    <button id="submitName">Continue</button>
  </div>

  <!-- Message Display -->
  <div id="loginMessage"></div>

  <script src="/js/signup.js" type="module"></script>
</body>
</html>
